version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: csm-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-csm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-csm_password}
      POSTGRES_DB: ${DB_NAME:-csm_db}
    ports:
      - "5432:5432"
    volumes:
      - csm_db_data:/var/lib/postgresql/data
    networks:
      - csm-network

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csm-orchestrator
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-csm_user}
      DB_PASSWORD: ${DB_PASSWORD:-csm_password}
      DB_NAME: ${DB_NAME:-csm_db}
      DB_PORT: 5432
      DB_SSLMODE: disable
      DB_TIMEZONE: UTC
      SERVER_PORT: 8080
      ALLOWED_ORIGIN: http://localhost
    depends_on:
      - db
    volumes:
      - ./backend/data:/app/data
    networks:
      - csm-network

networks:
  csm-network:
    driver: bridge

volumes:
  csm_db_data:
